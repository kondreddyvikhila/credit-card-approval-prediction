{% extends "base.html" %}

{% block title %}Predict Credit Card Approval{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-body p-5">

            <h2 class="text-center text-primary mb-4">
                Credit Card Approval Prediction
            </h2>

            <form action="/predict" method="POST" autocomplete="off" id="predictionForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option value="">Select</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Own Car</label>
                        <select class="form-select" name="car" required>
                            <option value="">Select</option>
                            <option value="Y">Yes</option>
                            <option value="N">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Own Realty</label>
                        <select class="form-select" name="realty" required>
                            <option value="">Select</option>
                            <option value="Y">Yes</option>
                            <option value="N">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Number of Children</label>
                        <input type="number"
                               class="form-control"
                               name="children"
                               min="0"
                               step="1"
                               autocomplete="off"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Annual Income</label>
                        <input type="number" class="form-control" name="income" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Income Type</label>
                        <select class="form-select" name="income_type" required>
                            <option value="">Select</option>
                            <option value="Working">Working</option>
                            <option value="Commercial associate">Commercial Associate</option>
                            <option value="Pensioner">Pensioner</option>
                            <option value="State servant">State Servant</option>
                            <option value="Student">Student</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Education</label>
                        <select class="form-select" name="education" required>
                            <option value="">Select</option>
                            <option value="Higher education">Higher Education</option>
                            <option value="Secondary / secondary special">Secondary</option>
                            <option value="Incomplete higher">Incomplete Higher</option>
                            <option value="Lower secondary">Lower Secondary</option>
                            <option value="Academic degree">Academic Degree</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Family Status</label>
                        <select class="form-select" name="family" required>
                            <option value="">Select</option>
                            <option value="Married">Married</option>
                            <option value="Single / not married">Single</option>
                            <option value="Civil marriage">Civil Marriage</option>
                            <option value="Separated">Separated</option>
                            <option value="Widow">Widow</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Housing Type</label>
                        <select class="form-select" name="housing" required>
                            <option value="">Select</option>
                            <option value="House / apartment">House / Apartment</option>
                            <option value="Rented apartment">Rented Apartment</option>
                            <option value="Municipal apartment">Municipal Apartment</option>
                            <option value="Office apartment">Office Apartment</option>
                            <option value="With parents">With Parents</option>
                            <option value="Co-op apartment">Co-op Apartment</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Work Phone</label>
                        <select class="form-select" name="work_phone" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <select class="form-select" name="phone" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <select class="form-select" name="email" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Occupation</label>
                        <select class="form-select" name="occupation" required>
                            <option value="">Select</option>
                            <option value="Managers">Managers</option>
                            <option value="Core staff">Core Staff</option>
                            <option value="Laborers">Laborers</option>
                            <option value="Sales staff">Sales Staff</option>
                            <option value="Drivers">Drivers</option>
                            <option value="Accountants">Accountants</option>
                            <option value="Medicine staff">Medicine Staff</option>
                            <option value="Security staff">Security Staff</option>
                            <option value="Cooking staff">Cooking Staff</option>
                            <option value="Cleaning staff">Cleaning Staff</option>
                            <option value="Private service staff">Private Service Staff</option>
                            <option value="High skill tech staff">High Skill Tech Staff</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Family Members</label>
                         <input type="number"
                           class="form-control"
                           name="family_members"
                           min="1"
                           step="1"
                           autocomplete="off"
                           required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number"
                               class="form-control"
                               name="age"
                               min="18"
                               max="100"
                               step="1"
                               autocomplete="off"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Years Employed</label>
                        <input type="number"
                              class="form-control"
                              name="employment"
                              min="0"
                              step="1"
                              autocomplete="off"
                              required>
                    </div>

                </div>

                <div class="text-center mt-4">

                    <button type="submit" class="btn btn-primary btn-lg">
                        Predict Approval
                    </button>

                    <button type="reset" class="btn btn-secondary btn-lg ms-2">
                        Reset
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
<script>
window.onload = function () {

    const form = document.getElementById("predictionForm");

    if(form){
        form.reset();
    }

    document.querySelectorAll("input").forEach(function(input){
        input.setAttribute("autocomplete", "off");

        if(input.type === "number"){
            input.step = "1";
        }
    });

    document.querySelectorAll("select").forEach(function(select){
        select.selectedIndex = 0;
        select.setAttribute("autocomplete", "off");
    });

};
</script>
{% endblock %}
